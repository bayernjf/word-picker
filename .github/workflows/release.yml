name: Release

# Release Workflow
#
# 两种触发方式：
#   1. 推送 v* tag → 正式发布（prerelease: false，生成 release notes）
#   2. push 到 dev 分支 → Dev Snapshot（prerelease: true，tag 为 snapshot，
#      每次覆盖上一个，产物始终指向最新 dev 的可用构建）
#
# 使用方式（正式发版）：
#   git tag v0.1.0
#   git push origin v0.1.0
#
# 使用方式（Dev Snapshot）：
#   push 到 dev 分支自动触发，无需手动操作。

on:
  push:
    tags:
      - "v*"
    branches:
      - dev

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-pack:
    name: Build & Pack Extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build dictionary
        run: npm run build:dict

      - name: Build extensions
        run: npm run build

      - name: Pack all extensions
        run: npm run pack

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: wordpicker-chrome
          path: dist/wordpicker-chrome.zip

      - name: Upload Safari extension
        uses: actions/upload-artifact@v4
        with:
          name: wordpicker-safari
          path: dist/wordpicker-safari.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'snapshot' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Dev Snapshot' }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          files: |
            dist/wordpicker-chrome.zip
            dist/wordpicker-safari.zip
          append_body: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove default source code assets
        run: |
          TAG="${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'snapshot' }}"
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | jq -r '.id')
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "Release not found, skipping"
            exit 0
          fi
          ASSETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            | jq -r '.[] | select(.name | startswith("Source code")) | .id')
          for ASSET_ID in $ASSETS; do
            echo "Removing asset $ASSET_ID"
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID"
          done
          echo "Done removing source code assets"
