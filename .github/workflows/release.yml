name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-pack:
    name: Build & Pack Extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build dictionary
        run: npm run build:dict

      - name: Pack all extensions
        run: npm run pack

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: wordpicker-chrome
          path: dist/wordpicker-chrome.zip

      - name: Upload Safari extension
        uses: actions/upload-artifact@v4
        with:
          name: wordpicker-safari
          path: dist/wordpicker-safari.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wordpicker-chrome.zip
            dist/wordpicker-safari.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
