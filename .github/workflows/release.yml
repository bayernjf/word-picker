name: Release

# Release Workflow
#
# 三种触发方式：
#   1. 推送 v* tag → 正式发布（使用指定 tag 名）
#   2. push 到 main 分支 → 正式发布（自动递增 patch 版本号）
#   3. push 到 dev 分支 → Dev Snapshot（prerelease: true，tag=snapshot，
#      版本固定 0.0.0.0，每次覆盖上一个，浏览器直接覆盖安装）
#
# 使用方式（正式发版，指定版本）：
#   git tag v0.1.0
#   git push origin v0.1.0
#
# 使用方式（正式发版，自动版本）：
#   合并/推送到 main 分支自动触发。
#
# 使用方式（Dev Snapshot）：
#   push 到 dev 分支自动触发，无需手动操作。

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - dev

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-pack:
    name: Build & Pack Extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Resolve release tag & version
        id: resolve-tag
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            MANIFEST_VERSION="${GITHUB_REF_NAME#v}"
            IS_PRERELEASE="false"
            RELEASE_NAME="${GITHUB_REF_NAME}"
            GEN_NOTES="true"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            # Auto-bump version based on latest v* tag
            LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
            if [ -z "$LATEST_TAG" ]; then
              NEW_TAG="v1.0.0"
            else
              BASE=${LATEST_TAG#v}
              MAJOR=$(echo "$BASE" | cut -d. -f1)
              MINOR=$(echo "$BASE" | cut -d. -f2)
              PATCH=$(echo "$BASE" | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
            fi
            TAG_NAME="$NEW_TAG"
            MANIFEST_VERSION="${NEW_TAG#v}"
            IS_PRERELEASE="false"
            RELEASE_NAME="$NEW_TAG"
            GEN_NOTES="true"
          else
            # dev branch -> snapshot (fixed version 0.0.0.0 so each build overwrites the previous)
            TAG_NAME="snapshot"
            MANIFEST_VERSION="0.0.0.0"
            IS_PRERELEASE="true"
            RELEASE_NAME="Dev Snapshot"
            GEN_NOTES="false"
          fi
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "manifest_version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "gen_notes=$GEN_NOTES" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG_NAME version=$MANIFEST_VERSION prerelease=$IS_PRERELEASE"

      - name: Build dictionary
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build:dict

      - name: Build extensions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          RELEASE_VERSION: ${{ steps.resolve-tag.outputs.manifest_version }}
        run: npm run build

      - name: Pack all extensions
        run: npm run pack

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: wordpicker-chrome
          path: dist/wordpicker-chrome.zip

      - name: Upload Safari extension
        uses: actions/upload-artifact@v4
        with:
          name: wordpicker-safari
          path: dist/wordpicker-safari.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve-tag.outputs.tag_name }}
          name: ${{ steps.resolve-tag.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.resolve-tag.outputs.is_prerelease == 'true' }}
          generate_release_notes: ${{ steps.resolve-tag.outputs.gen_notes == 'true' }}
          files: |
            dist/wordpicker-chrome.zip
            dist/wordpicker-safari.zip
          append_body: ${{ steps.resolve-tag.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove default source code assets
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag_name }}"
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | jq -r '.id')
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "Release not found, skipping"
            exit 0
          fi
          ASSETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            | jq -r --arg tag "$TAG" --arg repo "${{ github.event.repository.name }}" \
              '.[] | select(.name == "\($repo)-\($tag).zip" or .name == "\($repo)-\($tag).tar.gz") | .id')
          for ASSET_ID in $ASSETS; do
            echo "Removing asset $ASSET_ID"
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID"
          done
          echo "Done removing source code assets"
