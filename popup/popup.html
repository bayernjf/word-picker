<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordPicker 单词本</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="toolbar"><div class="brand-logo">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="brand-icon">
            <rect x="34" y="6" width="22" height="52" rx="3.5" fill="#fde68a"/>
            <rect x="8" y="4" width="22" height="54" rx="3.5" fill="#fbbf24"/>
            <rect x="19" y="10" width="26" height="40" rx="4" fill="#f97316"/>
            <path d="M24 21h16M24 29h16M24 37h12M24 45h9" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity="0.95"/>
          </svg>
        </div>
        <div>
          <h1>WordPicker</h1>
          <p>快速回顾已保存单词</p>
        </div>
        <a href="https://word-base.pages.dev/app" target="_blank" rel="noopener noreferrer" class="wordbase-link">
          <img src="../assets/wordbase-logo-full.svg" alt="WordBase" />
        </a>
      </header>

      <!-- 登录提示区域 -->
      <section id="auth-required" class="auth-required" style="display: none;">
        <div class="auth-message">
          <h2>🔐 请先登录</h2>
          <p>登录后才能查看和管理您的单词本</p>
          <a href="#" id="open-options" class="open-options-btn">打开设置登录</a>
        </div>
      </section>

      <!-- 主要内容区域 -->
      <section id="main-content" class="main-content">
        <section class="controls">
          <div class="book-selector">
            <label for="book-select">单词本：</label>
            <select id="book-select">
            </select>
            <button id="refresh-books" type="button" title="刷新单词本列表">🔄</button>
          </div>
          <input id="search-input" type="search" placeholder="搜索单词..." />
          <div class="export-actions">
            <button id="export-json" type="button">导出 JSON</button>
            <button id="export-csv" type="button">导出 CSV</button>
          </div>
        </section>

        <section id="sync-status" class="sync-status" aria-live="polite"></section>
        <section id="status" class="status" aria-live="polite"></section>
        <section id="word-list" class="word-list"></section>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
